<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlutenZero — Prototipo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: #ECE5D7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background-image:
      radial-gradient(circle at 25% 30%, rgba(31, 122, 77, 0.08), transparent 50%),
      radial-gradient(circle at 75% 70%, rgba(217, 142, 30, 0.06), transparent 50%);
  }
  #root {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  button:active { transform: scale(0.98); transition: transform 0.1s; }
</style>
</head>

<div id="root"></div>
